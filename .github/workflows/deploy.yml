name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t location:latest .

      - name: Save Docker image to file
        run: docker save location:latest -o location.tar

      - name: Create .env file from secrets
        run: |
          cat <<EOF > .env
          IP_GEOLOCATION_URL=${{ secrets.IP_GEOLOCATION_URL }}
          CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
          CORS_ALLOWED_HEADERS=${{ secrets.CORS_ALLOWED_HEADERS }}
          EOF

      - name: Prepare deploy files
        run: |
          mkdir location
          mv location.tar .env docker-compose.yml location/

      - name: Copy Docker image and .env to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "location/*"
          target: "~/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/location

            docker compose down || true
            docker rmi location:latest || true
            
            docker load -i location.tar
            rm location.tar
            
            docker compose up -d
